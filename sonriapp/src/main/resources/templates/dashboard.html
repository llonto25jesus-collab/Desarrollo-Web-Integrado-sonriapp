<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Sonriapp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex; min-height: 100vh; }

        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e5e5e5;
                   display: flex; flex-direction: column; padding: 1.5rem 0; flex-shrink: 0; }
        .sidebar-brand { padding: 0 1.25rem 1.25rem; font-size: 18px; font-weight: 600;
                         border-bottom: 1px solid #e5e5e5; }
        .sidebar-brand span { font-size: 12px; color: #888; font-weight: 400; display: block; margin-top: 2px; }

        .nav-section { padding: 1rem 0; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 1.25rem;
                    font-size: 14px; color: #555; text-decoration: none;
                    border-left: 2px solid transparent; }
        .nav-item:hover { background: #f5f5f5; color: #111; }
        .nav-item.active { color: #111; font-weight: 600; border-left: 2px solid #378ADD; background: #f0f6ff; }

        .nav-bottom { padding: 1rem 1.25rem; border-top: 1px solid #e5e5e5; margin-top: auto; }
        .user-info { font-size: 13px; color: #888; margin-bottom: 8px; }
        .user-info strong { display: block; color: #111; font-size: 14px; }
        .logout-btn { font-size: 13px; color: #555; text-decoration: none; }
        .logout-btn:hover { color: #111; }

        .main { flex: 1; padding: 2rem; }
        .page-title { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                      gap: 12px; margin-bottom: 2rem; }
        .metric-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 1rem; }
        .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
        .metric-value { font-size: 26px; font-weight: 600; }
        .metric-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
        .table-wrap { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #fafafa; color: #888; font-weight: 500; text-align: left;
             padding: 10px 14px; border-bottom: 1px solid #e5e5e5; }
        td { padding: 10px 14px; border-bottom: 1px solid #e5e5e5; }
        tr:last-child td { border-bottom: none; }
        .empty { color: #aaa; }

        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
        .badge-Pendiente  { background: #faeeda; color: #854f0b; }
        .badge-Completada { background: #eaf3de; color: #3b6d11; }
        .badge-Cancelada  { background: #fcebeb; color: #a32d2d; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        Sonriapp
        <span>Panel de control</span>
    </div>
    <nav class="nav-section">
        <a class="nav-item active" th:href="@{/dashboard}">Dashboard</a>
        <a class="nav-item" th:href="@{/pacientes}">Pacientes</a>
        <a class="nav-item" th:href="@{/citas}">Citas</a>
        <a class="nav-item" sec:authorize="hasAnyRole('Odontologo','Administrador')"
           th:href="@{/servicios}">Servicios</a>
        <a class="nav-item" sec:authorize="hasRole('Administrador')"
           th:href="@{/usuarios}">Usuarios</a>
    </nav>
    <div class="nav-bottom">
        <div class="user-info">
            <strong th:text="${nombreUsuario}">usuario@gmail.com</strong>
            <span th:text="${rol}">Rol</span>
        </div>
        <a class="logout-btn" th:href="@{/logout}">Cerrar sesión →</a>
    </div>
</aside>

<main class="main">
    <div class="page-title">Dashboard</div>

    <div class="cards-grid">
        <div class="metric-card">
            <div class="metric-label">Total pacientes</div>
            <div class="metric-value" th:text="${stats.totalPacientes}">0</div>
            <div class="metric-sub">registrados</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Citas este mes</div>
            <div class="metric-value" th:text="${stats.citasDelMes}">0</div>
            <div class="metric-sub"
                 th:text="${#temporals.format(fechaActual, 'MMMM yyyy', locale)}">
            </div>
        </div>
        <div class="metric-card" th:if="${esAdmin}">
            <div class="metric-label">Ingresos del mes</div>
            <div class="metric-value" th:text="'S/ ' + ${#numbers.formatDecimal(stats.ingresosDelMes, 1, 2)}">S/ 0</div>
            <div class="metric-sub">citas completadas</div>
        </div>
    </div>

    <div class="section-title">Citas de hoy</div>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Paciente</th>
                <th>Doctor</th>
                <th>Servicio</th>
                <th>Hora</th>
                <th>Estado</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(citasHoy)}">
                <td colspan="5" class="empty">No hay citas registradas para hoy.</td>
            </tr>
            <tr th:each="cita : ${citasHoy}">
                <td th:text="${cita.paciente.nombre + ' ' + cita.paciente.apellido}"></td>
                <td th:text="${cita.doctor.nombre + ' ' + cita.doctor.apellido}"></td>
                <td th:text="${cita.servicio.nombre}"></td>
                <td th:text="${#temporals.format(cita.hora, 'HH:mm')}"></td>
                <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${cita.estado}"
                              th:text="${cita.estado}"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
