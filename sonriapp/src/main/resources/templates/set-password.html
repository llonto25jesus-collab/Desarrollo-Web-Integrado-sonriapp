<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Establecer contraseña - Sonriapp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; display: flex;
               justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
                padding: 2rem; width: 100%; max-width: 420px; }
        .card-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .card-sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: #555; }
        .form-group input { width: 100%; padding: 9px; border: 1px solid #ddd;
                            border-radius: 4px; font-size: 14px; }
        .btn-submit { background: #378ADD; color: white; border: none; padding: 11px 20px;
                      border-radius: 4px; cursor: pointer; font-size: 14px; width: 100%; margin-top: 6px; }
        .btn-submit:hover { background: #2b6cb0; }
        .alert { padding: 10px; border-radius: 4px; margin-bottom: 14px; font-size: 13px; }
        .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .hint { font-size: 11px; color: #888; margin-top: 3px; }
        .brand { font-size: 22px; font-weight: 700; color: #378ADD; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">Sonriapp</div>

    <!-- Error de token inválido -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- Formulario si el token es válido -->
    <div th:if="${token}">
        <div class="card-title"
             th:text="${tipo == 'ACTIVACION'} ? 'Activa tu cuenta' : 'Nueva contraseña'"></div>
        <div class="card-sub">
            Hola <strong th:text="${nombre}">Usuario</strong>,
            <span th:text="${tipo == 'ACTIVACION'} ? 'establece tu contraseña para activar tu cuenta.' : 'ingresa tu nueva contraseña.'"></span>
        </div>

        <div id="alerta"></div>

        <div id="formContainer">
            <div class="form-group">
                <label>Nueva contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres">
                <div class="hint">Al menos 8 caracteres.</div>
            </div>
            <div class="form-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repite la contraseña">
            </div>
            <button class="btn-submit" onclick="establecerPassword()">
                <span th:text="${tipo == 'ACTIVACION'} ? 'Activar cuenta' : 'Guardar nueva contraseña'"></span>
            </button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var TOKEN = /*[[${token}]]*/ '';

    function mostrarAlerta(msg, tipo) {
        var cls = tipo === 'error' ? 'alert-error' : 'alert-success';
        document.getElementById('alerta').innerHTML = '<div class="alert ' + cls + '">' + msg + '</div>';
    }

    async function establecerPassword() {
        var pwd  = document.getElementById('password').value;
        var cpwd = document.getElementById('confirmPassword').value;
        if (pwd.length < 8) { mostrarAlerta('La contraseña debe tener al menos 8 caracteres.', 'error'); return; }
        if (pwd !== cpwd)   { mostrarAlerta('Las contraseñas no coinciden.', 'error'); return; }
        try {
            var resp = await fetch('/set-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: TOKEN, password: pwd, confirmPassword: cpwd })
            });
            var data = await resp.json();
            if (resp.ok && data.success) {
                mostrarAlerta('' + data.message, 'success');
                document.getElementById('formContainer').style.display = 'none';
                setTimeout(function() { window.location.href = '/login'; }, 3000);
            } else {
                mostrarAlerta(data.error || 'No se pudo establecer la contraseña.', 'error');
            }
        } catch (err) {
            mostrarAlerta('Error al conectar con el servidor.', 'error');
        }
    }
    /*]]>*/
</script>
</body>
</html>
